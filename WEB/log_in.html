<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Login</title>
    <link rel="stylesheet" href="/STYLES/styles.css">
</head>
<body>

<h2>Iniciar Sesión</h2>
    <div class="login">
    
    <!-- Cuadros para escribir -->
    <input type="text" id="usuario" placeholder="Tu usuario">
    <br>
    <input type="password" id="contra" placeholder="Tu contraseña">
    <br>
    
    <!-- El botón que dispara la función de JavaScript -->
    <button onclick="entrar()">Ingresar</button>
    </div>

    <script>
        function entrar() {
            // 1. Guardamos lo que escribió el usuario en variables
            var user = document.getElementById('usuario').value;
            var pass = document.getElementById('contra').value;

            // 2. Comparamos si es correcto
            if (user == "admin" && pass == "1234") {
                alert("¡Bienvenido! Los datos son correctos.");
                window.location.href = "index.html"; // Redirige a otra página
            } else {
                alert("Error: Usuario o clave equivocados.");
            }
        }
    </script>

</body>
</html>
